[global]
error_log = /dev/stderr
daemonize = no
log_limit = 8192

[www]
user  = nobody
group = nobody
listen = /run/php/php-fpm.sock
listen.owner = nobody
listen.group = nobody
listen.mode  = 0660

pm = ondemand
pm.max_children = 50
pm.process_idle_timeout = 30s
pm.max_requests = 500

clear_env = no
catch_workers_output = yes
decorate_workers_output = no
access.log = /dev/null

php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors] = on
